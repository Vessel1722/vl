<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T-Rex Extremo: Caos y Destrucción</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            color: #00FF00;
        }
        h1 {
            margin-bottom: 5px;
            text-shadow: 2px 2px #FF0000;
        }
        #game-container {
            position: relative;
        }
        canvas {
            background-color: #222;
            border: 5px solid #444;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
        }
        .controls {
            margin-top: 15px;
            background: #000;
            padding: 10px 20px;
            border: 1px solid #00FF00;
        }
    </style>
</head>
<body>

    <h1>T-REX EXTREMO</h1>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="400"></canvas>
    </div>
    <div class="controls">
        <p><b>Controles:</b> [ESPACIO] o [FLECHA ARRIBA] = Saltar | [Tecla X] = Disparar (Si tienes arma)</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Variables Globales
        let frame = 0;
        let score = 0;
        let gameOver = false;
        let shake = 0;
        let groundY = 350;

        // Entidades
        let enemies = [];
        let bullets = [];
        let particles = [];
        let powerups = [];

        // Jugador (El Dinosaurio)
        const player = {
            x: 50,
            y: 300,
            w: 40,
            h: 50,
            dy: 0,
            gravity: 0.8,
            jumpPower: -15,
            grounded: true,
            ammo: 0,
            color: '#32CD32' // Verde Dino
        };

        // Estado de teclas
        const keys = { space: false, x: false };

        // Efecto de Temblor de Pantalla
        function applyShake() {
            if (shake > 0) {
                const dx = (Math.random() - 0.5) * shake;
                const dy = (Math.random() - 0.5) * shake;
                ctx.translate(dx, dy);
                shake -= 0.5;
            }
        }

        // Creador de Partículas (Sangre/Explosiones)
        function createExplosion(x, y, color, amount) {
            for (let i = 0; i < amount; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 20 + Math.random() * 20,
                    color: color,
                    size: Math.random() * 6 + 2
                });
            }
        }

        // Lógica Principal de Actualización
        function update() {
            if (gameOver) return;
            frame++;
            score += 0.1;

            // Físicas del Jugador
            player.dy += player.gravity;
            player.y += player.dy;
            
            if (player.y + player.h >= groundY) {
                player.y = groundY - player.h;
                player.dy = 0;
                player.grounded = true;
            } else {
                player.grounded = false;
            }

            if (keys.space && player.grounded) {
                player.dy = player.jumpPower;
                player.grounded = false;
                createExplosion(player.x + 20, player.y + 50, '#888', 5); // Polvo al saltar
            }

            // Disparar Ametralladora (Exagerado)
            if (keys.x && player.ammo > 0 && frame % 4 === 0) {
                bullets.push({ x: player.x + player.w, y: player.y + 15, speed: 20 });
                player.ammo--;
                shake = 5; // Retraso y temblor visual
                createExplosion(player.x + player.w, player.y + 15, '#FFA500', 3); // Fogonazo
            }

            // Mover Balas
            bullets.forEach((b, i) => {
                b.x += b.speed;
                if (b.x > canvas.width) bullets.splice(i, 1);
            });

            // Generador de Enemigos Bizarros
            if (frame % Math.max(40, 100 - Math.floor(score/10)) === 0) {
                let r = Math.random();
                if (r > 0.6) {
                    // OVNI Volador
                    enemies.push({ x: 800, y: 150 + Math.random() * 100, w: 60, h: 20, speed: 8 + score/100, hp: 1, type: 'UFO', color: '#8A2BE2' });
                } else if (r > 0.3) {
                    // Zombie Mutante
                    enemies.push({ x: 800, y: groundY - 40, w: 40, h: 40, speed: 9 + score/100, hp: 2, type: 'ZOMBIE', color: '#006400' });
                } else {
                    // Cactus (Clásico pero rápido)
                    enemies.push({ x: 800, y: groundY - 50, w: 30, h: 50, speed: 8 + score/100, hp: 1, type: 'CACTUS', color: '#228B22' });
                }
            }

            // Generador de Cajas de Armas
            if (frame % 300 === 0 && Math.random() > 0.3) {
                powerups.push({ x: 800, y: 200, w: 30, h: 30, speed: 6 });
            }

            // Mover y Colisiones Cajas de Armas
            powerups.forEach((p, i) => {
                p.x -= p.speed;
                // Colisión con jugador
                if (player.x < p.x + p.w && player.x + player.w > p.x && player.y < p.y + p.h && player.y + player.h > p.y) {
                    player.ammo = 100; // ¡100 balas de locura!
                    shake = 10;
                    createExplosion(p.x, p.y, '#FFFF00', 20);
                    powerups.splice(i, 1);
                }
            });

            // Mover y Colisiones de Enemigos
            enemies.forEach((e, i) => {
                e.x -= e.speed;
                if (e.type === 'UFO') e.y += Math.sin(frame * 0.1) * 3; // Movimiento ondulante

                // Colisión Jugador vs Enemigo (Game Over)
                if (player.x < e.x + e.w && player.x + player.w > e.x && player.y < e.y + e.h && player.y + player.h > e.y) {
                    gameOver = true;
                    shake = 20;
                    createExplosion(player.x, player.y, '#FF0000', 50); // Sangre exagerada
                }

                // Colisión Bala vs Enemigo
                bullets.forEach((b, j) => {
                    if (b.x < e.x + e.w && b.x + 10 > e.x && b.y < e.y + e.h && b.y + 4 > e.y) {
                        e.hp--;
                        bullets.splice(j, 1);
                        createExplosion(b.x, b.y, '#FFA500', 5);
                        
                        if (e.hp <= 0) {
                            let color = e.type === 'ZOMBIE' ? '#8B0000' : (e.type === 'UFO' ? '#00FFFF' : '#00FF00');
                            createExplosion(e.x + e.w/2, e.y + e.h/2, color, 30);
                            enemies.splice(i, 1);
                            score += 10;
                            shake = 3;
                        }
                    }
                });

                if (e.x < -100) enemies.splice(i, 1);
            });

            // Mover Partículas
            particles.forEach((p, i) => {
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            });
        }

        // Lógica de Dibujado
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.save();
            applyShake(); // Aplicar temblor visual a todo lo que se dibuja abajo

            // Suelo
            ctx.fillStyle = '#555';
            ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
            ctx.strokeStyle = '#00FF00';
            ctx.beginPath();
            ctx.moveTo(0, groundY);
            ctx.lineTo(canvas.width, groundY);
            ctx.stroke();

            // Dibujar Partículas
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            });

            // Dibujar Cajas de Armas
            powerups.forEach(p => {
                ctx.fillStyle = (frame % 10 < 5) ? '#FFFF00' : '#FF4500'; // Parpadeo
                ctx.fillRect(p.x, p.y, p.w, p.h);
                ctx.fillStyle = '#000';
                ctx.font = '20px Courier New';
                ctx.fillText('W', p.x + 7, p.y + 22);
            });

            // Dibujar Enemigos
            enemies.forEach(e => {
                ctx.fillStyle = e.color;
                if (e.type === 'UFO') {
                    ctx.beginPath();
                    ctx.ellipse(e.x + e.w/2, e.y + e.h/2, e.w/2, e.h/2, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#00FFFF'; // Cúpula OVNI
                    ctx.beginPath();
                    ctx.arc(e.x + e.w/2, e.y, 10, Math.PI, 0);
                    ctx.fill();
                } else if (e.type === 'ZOMBIE') {
                    ctx.fillRect(e.x, e.y, e.w, e.h);
                    ctx.fillStyle = '#FF0000'; // Ojos rojos
                    ctx.fillRect(e.x + 5, e.y + 10, 8, 8);
                } else {
                    ctx.fillRect(e.x, e.y, e.w, e.h); // Cactus
                }
            });

            // Dibujar Balas
            ctx.fillStyle = '#FFFF00';
            bullets.forEach(b => {
                ctx.fillRect(b.x, b.y, 15, 4);
            });

            // Dibujar Jugador
            if (!gameOver) {
                ctx.fillStyle = player.color;
                ctx.fillRect(player.x, player.y, player.w, player.h);
                // Ojo de furia
                ctx.fillStyle = '#FF0000';
                ctx.fillRect(player.x + 25, player.y + 10, 5, 5);
                
                // Si tiene arma, dibujar una metralleta absurda
                if (player.ammo > 0) {
                    ctx.fillStyle = '#888';
                    ctx.fillRect(player.x + 20, player.y + 20, 30, 10);
                    ctx.fillStyle = '#333';
                    ctx.fillRect(player.x + 45, player.y + 18, 5, 14);
                }
            }

            ctx.restore(); // Fin del temblor visual

            // Interfaz de Usuario (HUD)
            ctx.fillStyle = '#FFF';
            ctx.font = '20px Courier New';
            ctx.fillText(`Puntos: ${Math.floor(score)}`, 20, 30);
            
            if (player.ammo > 0) {
                ctx.fillStyle = '#FFFF00';
                ctx.fillText(`MUNICIÓN: ${player.ammo}`, 20, 60);
                if (frame % 20 < 10) ctx.fillText('¡MANTÉN LA "X"!', 20, 90);
            }

            if (gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#FF0000';
                ctx.font = '40px Courier New';
                ctx.fillText('¡DESTRUIDO!', canvas.width/2 - 120, canvas.height/2 - 20);
                ctx.fillStyle = '#FFF';
                ctx.font = '20px Courier New';
                ctx.fillText('Presiona R para reiniciar', canvas.width/2 - 150, canvas.height/2 + 20);
            }
        }

        // Bucle Principal
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        // Reiniciar Juego
        function resetGame() {
            player.y = 300;
            player.dy = 0;
            player.ammo = 0;
            enemies = [];
            bullets = [];
            particles = [];
            powerups = [];
            score = 0;
            frame = 0;
            gameOver = false;
            shake = 0;
        }

        // Controles Event Listeners
        window.addEventListener('keydown', e => {
            if (e.code === 'Space' || e.code === 'ArrowUp') keys.space = true;
            if (e.key.toLowerCase() === 'x') keys.x = true;
            if (e.key.toLowerCase() === 'r' && gameOver) resetGame();
        });

        window.addEventListener('keyup', e => {
            if (e.code === 'Space' || e.code === 'ArrowUp') keys.space = false;
            if (e.key.toLowerCase() === 'x') keys.x = false;
        });

        // Iniciar
        loop();
    </script>
</body>
</html>
